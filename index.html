<!DOCTYPE html>
<html>
<head>
  <title>Court Ledger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Court File Entry</h2>

<form id="form">
  <input id="party" placeholder="Party Name" required>
  <input id="section" placeholder="Section" required>
  <input id="ps" placeholder="Police Station">
  <input type="date" id="receive">
  <input type="date" id="next">
  <button type="submit">Save</button>
</form>

<table border="1">
  <thead>
    <tr>
      <th>Party</th><th>Section</th><th>PS</th>
      <th>Receive</th><th>Next</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>
<input id="search" placeholder="Search Party / Section">
<script src="script.js"></script>
</body>
</html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<th>Action</th>
<button onclick="todayReceive()">Today Receive</button>
<button onclick="downloadExcel()">Download Excel</button>
